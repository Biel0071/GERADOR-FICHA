<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Fixture WhatsApp - Projeto Ficha</title>
  </head>
  <body>
    <main id="main">
      <header>
        <div role="button">
          <span title="Joao Materiais">Joao Materiais</span>
        </div>
      </header>

      <section data-testid="conversation-panel-wrapper">
        <div data-testid="msg-container" class="message-in">
          <div data-pre-plain-text="[09:12, 28/05/2026] Joao:">
            <span class="selectable-text copyable-text">Bom dia, preciso de 10 sacos de cimento CPII</span>
          </div>
          <span data-testid="msg-meta">09:12</span>
        </div>

        <div data-testid="msg-container" class="message-out">
          <div data-pre-plain-text="[09:13, 28/05/2026] Loja:">
            <span class="selectable-text copyable-text">Vai retirar ou quer entrega?</span>
          </div>
          <span data-testid="msg-meta">09:13</span>
        </div>

        <div data-testid="msg-container" class="message-in">
          <div data-pre-plain-text="[09:15, 28/05/2026] Joao:">
            <span class="selectable-text copyable-text">Entrega. Meu telefone e 31999999999. Falta confirmar endereco.</span>
          </div>
          <span data-testid="msg-meta">09:15</span>
        </div>
      </section>
    </main>
  </body>
</html>
